  Reddit:
    method: settings
    login_url: https://www.reddit.com/settings/account
    notes: Settings > Account > Email address

  # ── Dev Tools ──────────────────────────────────────────────────────────────
  GitKraken:
    method: settings
    login_url: https://app.gitkraken.com/account-info
