# Service Map — accounts.py
# ─────────────────────────────────────────────────────────────────────────────
# Copy this file to config/services.yaml and add entries for your own services.
#
# Maps an email domain (or domain fragment) to a friendly service name and
# login URL. Used by accounts.py to build your account inventory.
#
# Lookup order (most-specific to least-specific):
#   1. Exact domain match:   "mail.example.com"
#   2. Parent domain match:  "example.com"
#
# If a domain is not listed here, accounts.py will auto-derive a best-guess
# name and URL from the domain itself.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Google ─────────────────────────────────────────────────────────────────
  accounts.google.com:
    name: Google
    url: https://myaccount.google.com
  google.com:
    name: Google
    url: https://myaccount.google.com
