# Contact Directory — email_update.py
# ─────────────────────────────────────────────────────────────────────────────
# Copy this file to config/contacts.yaml and customise it for your services.
#
# Used by email_update.py to generate a checklist when changing your email
# address across all your online accounts.
#
# Each entry key is the service NAME (must match what accounts.py outputs).
# Fields:
#   method     — how to update the email address:
#                  "settings" → self-service via account settings page
#                  "portal"   → log in to the service portal
#                  "email"    → send a support email (use the template)
#                  "phone"    → must call customer support
#   login_url  — direct URL to the email-change settings page (for settings/portal)
#   contact    — support email address (for email/phone methods)
#   notes      — any extra steps or gotchas
# ─────────────────────────────────────────────────────────────────────────────

contacts:

  # ── Google ─────────────────────────────────────────────────────────────────
  Google:
    method: settings
    login_url: https://myaccount.google.com/email
    notes: Add new address, verify it, then change primary

  Google Play:
    method: settings
    login_url: https://myaccount.google.com/email
    notes: Linked to Google Account

  Google Cloud:
    method: settings
    login_url: https://myaccount.google.com/email
    notes: Linked to Google Account

  # ── Microsoft ──────────────────────────────────────────────────────────────
  Microsoft:
    method: settings
    login_url: https://account.microsoft.com/account/manageaccounts
    notes: Add alias first, then set as primary

  # ── Amazon / AWS ───────────────────────────────────────────────────────────
  Amazon:
    method: settings
    login_url: https://www.amazon.com/gp/css/account/info/view.html
    notes: Account > Login & security

  AWS:
    method: settings
    login_url: https://console.aws.amazon.com/billing/home#/account
    notes: Update root account email in Account Settings

  # ── PayPal ─────────────────────────────────────────────────────────────────
  PayPal:
    method: settings
    login_url: https://www.paypal.com/myaccount/settings/
    notes: Settings > Email — add new, verify, set primary

  # ── LinkedIn ───────────────────────────────────────────────────────────────
  LinkedIn:
    method: settings
    login_url: https://www.linkedin.com/psettings/email-addresses
    notes: Add new email, verify, make primary

  # ── GitHub ─────────────────────────────────────────────────────────────────
  GitHub:
    method: settings
    login_url: https://github.com/settings/emails
    notes: Add new address, verify it, then set as primary

  # ── OpenAI / Claude ────────────────────────────────────────────────────────
  OpenAI:
    method: settings
    login_url: https://platform.openai.com/account/profile
    notes: Update in profile settings

  Claude (Anthropic):
    method: settings
    login_url: https://claude.ai/settings
    notes: Update in account settings

  # ── Gaming ─────────────────────────────────────────────────────────────────
  Steam:
    method: settings
    login_url: https://store.steampowered.com/account/emailoptout
    notes: Steam Guard confirmation required — allow up to 3 days

  Epic Games:
    method: settings
    login_url: https://www.epicgames.com/account/personal
    notes: Account > Personal > Email

  GOG.com:
    method: settings
    login_url: https://www.gog.com/en/account/settings
    notes: Update in Account Settings

  Rockstar Games:
    method: settings
    login_url: https://socialclub.rockstargames.com/settings/account
    notes: Update in Social Club Account Settings

  Twitch:
    method: settings
    login_url: https://www.twitch.tv/settings/security
    notes: Settings > Security and Privacy > Email

  Xbox:
    method: settings
    login_url: https://account.microsoft.com/account/manageaccounts
    notes: Linked to Microsoft Account

  Humble Bundle:
    method: settings
    login_url: https://www.humblebundle.com/account/keys
    notes: Account > Settings > Email

  # ── Streaming / Entertainment ──────────────────────────────────────────────
  Netflix:
    method: settings
    login_url: https://www.netflix.com/account
    notes: Account > Membership and billing > Email

  Spotify:
    method: settings
    login_url: https://www.spotify.com/account/profile/
    notes: Account > Edit profile > Email

  Plex:
    method: settings
    login_url: https://app.plex.tv/desktop/#!/account
    notes: Plex > Account > Email Address

  # ── Social ─────────────────────────────────────────────────────────────────
  Facebook:
    method: settings
